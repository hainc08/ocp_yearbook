<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yearbook Class of 2026 – VinSchool Ocean Park</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════════════════════════════════
     SCREEN 1 — LANDING
══════════════════════════════════ -->
<div id="s-landing" class="screen active">

  <!-- Logos -->
  <div class="logo-tl deco">
    <div class="school-icon">📖</div>
    <span class="school-name">VINSCHOOL</span>
  </div>
  <div class="logo-tr deco">
    <div class="park-badge">OCEAN<br>PARK</div>
  </div>

  <!-- Decorations -->
  <div class="deco paper-note"></div>
  <div class="deco sticker-pin">📌</div>
  <div class="deco sticker-cool">😎</div>
  <div class="deco sticker-spark1">✦</div>
  <div class="deco sticker-cam">📷</div>
  <div class="deco sticker-shell">🌟</div>
  <div class="deco sticker-star2">✦</div>
  <div class="deco sticker-cal">
    <div style="font-size:18px;font-weight:700;margin-bottom:4px">2026</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:2px;font-size:10px;color:#555">
      <span>01</span><span>02</span><span>03</span><span>04</span>
      <span>05</span><span>06</span><span>07</span><span>08</span>
      <span>09</span><span>10</span><span>11</span><span>12</span>
    </div>
  </div>

  <!-- Folder -->
  <div class="folder-wrap">
    <div class="folder-tab"></div>
    <div class="folder-body">

      <!-- Three stars with labels -->
      <div class="stars-row">
        <div class="star-shape star-left">
          <svg class="star-svg" width="170" height="160" viewBox="0 0 100 95">
            <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="url(#sg1)" stroke="#c8a030" stroke-width="1.5"/>
            <defs><linearGradient id="sg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f9e870"/><stop offset="100%" stop-color="#d4a820"/></linearGradient></defs>
          </svg>
          <span class="star-label">Class</span>
        </div>

        <div class="star-shape star-mid">
          <svg class="star-svg" width="130" height="125" viewBox="0 0 100 95">
            <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="url(#sg2)" stroke="#c8a030" stroke-width="1.5"/>
            <polygon points="50,20 58,42 82,42 63,55 70,77 50,64 30,77 37,55 18,42 42,42" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
            <defs><linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f9e870"/><stop offset="100%" stop-color="#d4a820"/></linearGradient></defs>
          </svg>
          <span class="star-label" style="font-size:22px">of</span>
        </div>

        <div class="star-shape star-right">
          <svg class="star-svg" width="170" height="160" viewBox="0 0 100 95">
            <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="url(#sg3)" stroke="#c8a030" stroke-width="1.5"/>
            <defs><linearGradient id="sg3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f9e870"/><stop offset="100%" stop-color="#d4a820"/></linearGradient></defs>
          </svg>
          <span class="star-label">2026</span>
        </div>
      </div>

      <div class="yearbook-title">YEARBOOK</div>
      <button class="btn-open" onclick="goLoading()">[click to open]</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     SCREEN 2 — LOADING
══════════════════════════════════ -->
<div id="s-loading" class="screen">
  <div class="loading-bubble">
    <span class="emoji-waiting">🤔</span>
    <div class="bubble-text">đợi xíu nè...</div>
  </div>
  <div class="loading-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- ══════════════════════════════════
     SCREEN 3 — CLASS PICKER
══════════════════════════════════ -->
<div id="s-classes" class="screen">
  <div class="board-frame">
    <div class="board-title">choose your class!</div>
    <div class="board-subtitle-wrap">
      <span class="duck">🦆</span>
      <div class="board-subtitle-pill">chọn lớp của mình nha!</div>
    </div>

    <!-- Row 1: 5 classes -->
    <div class="classes-grid" id="classGrid">
      <!-- generated by JS -->
    </div>

    <!-- deco corners -->
    <div class="board-deco-tl">📌</div>
    <div class="board-deco-tr">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <path d="M20,2 L23,14 L36,14 L26,22 L30,34 L20,26 L10,34 L14,22 L4,14 L17,14Z" fill="#f0c030" stroke="#c89010" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="board-deco-bl" style="bottom:12px;left:12px;font-size:28px;color:#2244bb;font-weight:900;transform:rotate(-5deg)">⚡</div>
  </div>
</div>

<!-- ══════════════════════════════════
     SCREEN 4 — CLASS VIEW
══════════════════════════════════ -->
<div id="s-classview" class="screen">
  <!-- tabs -->
  <div class="tabs-bar">
    <button class="tab-btn lobby" onclick="goClasses()">lobby</button>
    <button class="tab-btn classname" id="tab-classname">9A1</button>
  </div>

  <!-- board content -->
  <div class="classview-board">
    <!-- board decorations -->
    <div class="bd-star1 deco">⭐</div>
    <div class="bd-excl deco" style="top:40px;left:14px;font-size:32px">❕</div>
    <div class="bd-curl deco">🌀</div>
    <div class="bd-star2 deco">✨</div>
    <div class="bd-ribbon deco">🎀</div>

    <!-- photo grid -->
    <div class="photo-grid" id="photoGrid"></div>
  </div>
</div>

<!-- ══════════════════════════════════
     LIGHTBOX
══════════════════════════════════ -->
<div id="lightbox">
  <div class="lb-inner">
    <button class="lb-download" title="Tải ảnh" onclick="downloadPhoto()">⬇</button>
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <div class="lb-photo" id="lb-photo"></div>
  </div>
  <button class="lb-btn lb-prev" onclick="lbMove(-1)">‹</button>
  <button class="lb-btn lb-next" onclick="lbMove(1)">›</button>
</div>

<script src="js/script.js"></script>
</body>
</html>
