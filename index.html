<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yearbook Class of 2026 – VinSchool Ocean Park</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ══════════════════════════════════
     SCREEN 1 — LANDING
══════════════════════════════════ -->
  <div id="s-landing" class="screen active">

    <!-- Logos -->
    <div class="logo-tl deco">
      <img src="images/logo_vinschool.png" alt="Vinschool Logo" style="height: 62px; object-fit: contain;">
    </div>
    <div class="logo-tr deco">
      <img src="images/logo_ocp.png" alt="Ocean Park Logo" style="height: 91px; object-fit: contain;">
    </div>

    <!-- Decorations -->
    <div class="deco item-left">
      <img src="images/item_left.png" alt="Decoration Left" style="width: 150px;">
    </div>

    <div class="deco sticker-cool">😎</div>

    <div class="deco item-right">
      <img src="images/item_right.png" alt="Decoration Right" style="width: 180px;">
    </div>

    <!-- Folder -->
    <div class="folder-wrap">
      <!-- <div class="folder-tab"></div> -->
      <div class="folder-body">

        <!-- Three stars with labels -->
        <div class="stars-row">
          <div class="star-shape star-left">
            <svg class="star-svg" width="170" height="160" viewBox="0 0 100 95">
              <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="url(#sg1)"
                stroke="#c8a030" stroke-width="1.5" />
              <defs>
                <linearGradient id="sg1" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#f9e870" />
                  <stop offset="100%" stop-color="#d4a820" />
                </linearGradient>
              </defs>
            </svg>
            <span class="star-label">Class</span>
          </div>

          <div class="star-shape star-mid">
            <svg class="star-svg" width="130" height="125" viewBox="0 0 100 95">
              <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="url(#sg2)"
                stroke="#c8a030" stroke-width="1.5" />
              <polygon points="50,20 58,42 82,42 63,55 70,77 50,64 30,77 37,55 18,42 42,42" fill="none"
                stroke="rgba(255,255,255,0.3)" stroke-width="1" />
              <defs>
                <linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#f9e870" />
                  <stop offset="100%" stop-color="#d4a820" />
                </linearGradient>
              </defs>
            </svg>
            <span class="star-label" style="font-size:22px">of</span>
          </div>

          <div class="star-shape star-right">
            <svg class="star-svg" width="170" height="160" viewBox="0 0 100 95">
              <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="url(#sg3)"
                stroke="#c8a030" stroke-width="1.5" />
              <defs>
                <linearGradient id="sg3" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#f9e870" />
                  <stop offset="100%" stop-color="#d4a820" />
                </linearGradient>
              </defs>
            </svg>
            <span class="star-label">2026</span>
          </div>
        </div>

        <div class="yearbook-title">YEARBOOK</div>
        <button class="btn-open" onclick="goLoading()">[click to open]</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════
     SCREEN 2 — LOADING
══════════════════════════════════ -->
  <div id="s-loading" class="screen">
    <div class="loading-bubble">
      <span class="emoji-waiting">🤔</span>
      <div class="bubble-text">đợi xíu nè...</div>
    </div>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- ══════════════════════════════════
     SCREEN 3 — CLASS PICKER
══════════════════════════════════ -->
  <div id="s-classes" class="screen">
    <div class="stick-left">
      <img src="images/stick_left.png" alt="Stick Left">
    </div>
    <div class="board-frame">
      <div class="board-title">choose your class!</div>
      <div class="board-subtitle-wrap">
        <img src="images/btn_choice_class.png" alt="Chọn lớp của mình nha!" class="btn-choice-img">
      </div>

      <!-- Row 1: 5 classes -->
      <div class="classes-grid" id="classGrid">
        <!-- generated by JS -->
      </div>

      <!-- deco corners -->
      <!-- <div class="board-deco-tl">📌</div> -->
      <div class="board-deco-tr">
        <svg width="40" height="40" viewBox="0 0 40 40">
          <path d="M20,2 L23,14 L36,14 L26,22 L30,34 L20,26 L10,34 L14,22 L4,14 L17,14Z" fill="#f0c030" stroke="#c89010"
            stroke-width="1.5" />
        </svg>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════
     SCREEN 4 — CLASS VIEW
══════════════════════════════════ -->
  <div id="s-classview" class="screen">
    <!-- tabs -->
    <div class="tabs-bar">
      <button class="tab-btn lobby" onclick="goClasses()">lobby</button>
      <button class="tab-btn classname" id="tab-classname">9A1</button>
    </div>

    <!-- board content -->
    <div class="classview-board">
      <!-- photo grid -->
      <div id="stickerContainer"></div>
      <div class="photo-grid" id="photoGrid"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════
     LIGHTBOX
══════════════════════════════════ -->
  <div id="lightbox">
    <div class="lb-inner">
      <button class="lb-download" title="Tải ảnh" onclick="downloadPhoto()">⬇</button>
      <button class="lb-close" onclick="closeLightbox()">✕</button>
      <div class="lb-photo" id="lb-photo"></div>
      <div class="lb-name" id="lb-name"></div>
      <div class="lb-counter" id="lb-counter"></div>
    </div>
    <button class="lb-btn lb-prev" onclick="lbMove(-1)">‹</button>
    <button class="lb-btn lb-next" onclick="lbMove(1)">›</button>
  </div>

  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
